<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trash Sort — Sustainability Game</title>
    <style>
        /* University of St. Thomas Color Scheme */
        body {
            background-color: #512698; /* UST Purple */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: auto;
        }

        .header {
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0,0,0,0.2);
        }

        .back-btn {
            background-color: #999999; /* UST Grey */
            color: white;
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .back-btn:hover {
            background-color: #777777;
        }

        #canvas-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            max-height: 80vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Trash Sort</h2>
        <a href="../index.html" class="back-btn">Back to Catalogue</a>
    </div>

    <div id="canvas-container">
        <iframe frameborder="0" src="https://itch.io/embed-upload/17500666?color=333333" allowfullscreen="" width="1280" height="740"><a href="https://privateryan13.itch.io/trashsort">Play TrashSort on itch.io</a></iframe>
    </div>

</body>
</html>
