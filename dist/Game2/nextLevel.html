<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Over</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #9E26B5;
            font-family: 'system-ui', -apple-system, sans-serif;
            color: #ecf0f1;
        }

        .menu-container {
            text-align: center;
            background: #34495e;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 320px;
        }

        h1 {
            margin-bottom: 2rem;
            font-size: 2.5rem;
            color: #ecf0f1;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            text-decoration: none;
            color: white;
            display: block;
        }
        .btn-nxtlvl { background-color: #520C77; }
        .btn-nxtlvl:hover { background-color: #70388e; }

        .btn-restart { background-color: #520C77; }
        .btn-restart:hover { background-color: #70388e; }

        .btn-main { background-color: #520C77; }
        .btn-main:hover { background-color: #70388e; }


        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>PERFECTLY SORTED!</h1> <p>You've organized the fridge for maximum freshness and safety!
        </p> <div class="button-stack">
            <a href="game.html" class="btn btn-nxtlvl">Next Level</a>

            <a href="game.html" class="btn btn-restart">Restart</a>
            
            <a href="index.html" class="btn btn-main">Main Menu</a>
        </div>
    </div>

</body>
</html>
